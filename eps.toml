[package]
name        = "epm_registry"
version     = "0.1.0"
description = "The EPM package registry — search, publish, and browse EPS packages."
authors     = ["nickagliano"]
license     = "Proprietary"
repository  = "https://github.com/nickagliano/epm_registry"
platform    = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[eps]

[service]
enabled      = true
start        = "HOST=$(tailscale ip -4) ./serve.sh"
port         = 3001
health_check = "GET /health"
